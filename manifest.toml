packaging_format = 2

id = "orthoptie"
name = "OrthoDesk"
description.en = "Patient records management for orthoptic practice"
description.fr = "Gestion des dossiers patients pour cabinet d'orthoptie"

version = "1.0~ynh1"

maintainers = ["tanios43"]

[upstream]
license = "AGPL-3.0"
code = "https://github.com/tanios43/orthoptie_ynh"

[integration]
yunohost = ">= 11.2"
architectures = "all"
multi_instance = false
ldap = false
sso = false
disk = "500M"
ram.build = "200M"
ram.runtime = "100M"

[install]

    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "admins"

[resources]

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.ports]
    main.default = 5001

    [resources.apt]
    packages = "python3, python3-pip, python3-venv, libreoffice, poppler-utils, rsync, sqlite3, libsqlcipher-dev, libsqlcipher0, sqlcipher, at"
